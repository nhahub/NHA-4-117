<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Organization Dashboard — AI Observer</title>
  <meta name="description" content="AI Observer organization dashboard for managing teachers, students, and institutional settings." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/exam_portal.css" />
</head>
<body>
  <header class="site">
    <div class="inner">
      <a href="/" class="brand" style="text-decoration:none;color:inherit">AI <span>Observer</span></a>
      <div style="display:flex;align-items:center;gap:1rem">
        <span style="font-size:0.85rem;color:var(--text-secondary)">Organization: <strong id="orgHeaderName" style="color:var(--text)">—</strong></span>
        <button type="button" class="ghost" id="orgSignOutBtn" style="font-size:0.78rem;padding:0.35rem 0.75rem">Sign Out</button>
      </div>
    </div>
  </header>

  <main>
    <!-- Stats Overview -->
    <div class="grid-3" id="orgStatsRow" style="margin-bottom:1.5rem">
      <div class="stat-card">
        <div class="stat-value" id="statTeachers">0</div>
        <div class="stat-label">Teachers</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statStudents">0</div>
        <div class="stat-label">Students</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statOrgName">—</div>
        <div class="stat-label">Organization</div>
      </div>
    </div>

    <!-- Create Teacher / Create Student -->
    <div class="grid-2">
      <div class="card">
        <h2>Create Teacher</h2>
        <p class="sub">Add a teacher account to your organization.</p>
        <form id="teacherForm">
          <label for="t_id">Teacher ID</label><input id="t_id" type="text" required />
          <label for="t_name">Full Name</label><input id="t_name" type="text" required />
          <label for="t_email">Email</label><input id="t_email" type="email" required />
          <label for="t_password">Password</label><input id="t_password" type="password" required minlength="8" />
          <label for="t_dept">Department</label><input id="t_dept" type="text" required />
          <button type="submit" class="primary">Create Teacher</button>
        </form>
        <div id="teacherMsg" class="msg"></div>
      </div>
      <div class="card">
        <h2>Create Student</h2>
        <p class="sub">Add a student account to your organization.</p>
        <form id="studentCreateForm">
          <label for="s_id">Student ID</label><input id="s_id" type="text" required />
          <label for="s_name">Full Name</label><input id="s_name" type="text" required />
          <label for="s_email">Email</label><input id="s_email" type="email" required />
          <label for="s_password">Password</label><input id="s_password" type="password" required minlength="8" />
          <button type="submit" class="primary">Create Student</button>
        </form>
        <div id="studentCreateMsg" class="msg"></div>
      </div>
    </div>

    <!-- Recent Accounts -->
    <div class="card" id="orgAccountsCard">
      <h2>Recent Accounts <span class="tag">API</span></h2>
      <div class="row-actions"><button type="button" class="ghost" id="orgRefreshAccounts">Refresh List</button></div>
      <pre class="json" id="orgAccountsOut">{}</pre>
    </div>
  </main>

  <script>
  (function () {
    "use strict";
    const $ = (id) => document.getElementById(id);

    function orgCreds() {
      return {
        org_email: sessionStorage.getItem("org_email") || "",
        org_password: sessionStorage.getItem("org_password") || "",
      };
    }

    async function jsonFetch(path, opts) {
      const headers = Object.assign({ "Content-Type": "application/json" }, opts.headers || {});
      const res = await fetch(path, Object.assign({}, opts, { headers }));
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const err = new Error(data.detail || res.statusText || "Request failed");
        err.status = res.status;
        err.body = data;
        throw err;
      }
      return data;
    }

    function setMsg(id, text, cls) {
      const el = $(id);
      if (!el) return;
      el.textContent = text || "";
      el.className = "msg" + (cls ? " " + cls : "");
    }

    // Check session
    const creds = orgCreds();
    if (!creds.org_email) {
      window.location.href = "/";
    }

    $("orgHeaderName").textContent = sessionStorage.getItem("org_name") || creds.org_email;
    $("statOrgName").textContent = sessionStorage.getItem("org_name") || "—";

    // Sign out
    $("orgSignOutBtn").addEventListener("click", () => {
      sessionStorage.clear();
      window.location.href = "/";
    });

    // Load accounts
    async function refreshOrgAccounts() {
      const c = orgCreds();
      if (!c.org_email) return;
      try {
        const data = await jsonFetch("/api/org/accounts", {
          method: "POST",
          body: JSON.stringify(c),
        });
        $("orgAccountsOut").textContent = JSON.stringify(data, null, 2);
        // Update stats
        const teachers = data.teachers || [];
        const students = data.students || [];
        $("statTeachers").textContent = teachers.length;
        $("statStudents").textContent = students.length;
      } catch (err) {
        $("orgAccountsOut").textContent = JSON.stringify(err.body || { error: err.message }, null, 2);
      }
    }

    $("orgRefreshAccounts").addEventListener("click", refreshOrgAccounts);

    // Create Teacher
    $("teacherForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const c = orgCreds();
      setMsg("teacherMsg", "Creating…", "");
      const body = Object.assign({}, c, {
        teacher_id: $("t_id").value.trim(),
        full_name: $("t_name").value.trim(),
        email: $("t_email").value.trim(),
        password: $("t_password").value,
        department: $("t_dept").value.trim(),
      });
      try {
        await jsonFetch("/api/org/teachers", { method: "POST", body: JSON.stringify(body) });
        setMsg("teacherMsg", "Teacher created successfully!", "ok");
        $("teacherForm").reset();
        refreshOrgAccounts();
      } catch (err) {
        setMsg("teacherMsg", String(err.body?.detail || err.message), "error");
      }
    });

    // Create Student
    $("studentCreateForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const c = orgCreds();
      setMsg("studentCreateMsg", "Creating…", "");
      const body = Object.assign({}, c, {
        student_id: $("s_id").value.trim(),
        full_name: $("s_name").value.trim(),
        email: $("s_email").value.trim(),
        password: $("s_password").value,
      });
      try {
        await jsonFetch("/api/org/students", { method: "POST", body: JSON.stringify(body) });
        setMsg("studentCreateMsg", "Student created successfully!", "ok");
        $("studentCreateForm").reset();
        refreshOrgAccounts();
      } catch (err) {
        setMsg("studentCreateMsg", String(err.body?.detail || err.message), "error");
      }
    });

    // Initial load
    refreshOrgAccounts();
  })();
  </script>
</body>
</html>
